name: Build and Deploy PetStore

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  ACR_NAME: vodemopetstoreappcontainer
  ACR_LOGIN_SERVER: vodemopetstoreappcontainer.azurecr.io
  RESOURCE_GROUP: demo-rg

jobs:
  # ─── Build all services ───
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - petstoreapp
          - petstorepetservice
          - petstoreproductservice
          - petstoreorderservice
          - petstoreorderitemsreserver
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar

  # ─── Push Docker images to ACR ───
  push-images:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - petstoreapp
          - petstorepetservice
          - petstoreproductservice
          - petstoreorderservice
          - petstoreorderitemsreserver
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/

      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          cd ${{ matrix.service }}
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }} \
                       -t ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest

  # ─── Deploy to Azure Container Apps ───
  deploy:
    needs: push-images
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy petstoreapp
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: petstore-app
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/petstoreapp:${{ github.sha }}

      - name: Deploy petstorepetservice
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: petstore-petservice
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/petstorepetservice:${{ github.sha }}

      - name: Deploy petstoreproductservice
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: petstore-productservice
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/petstoreproductservice:${{ github.sha }}

      - name: Deploy petstoreorderservice
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: petstore-orderservice
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/petstoreorderservice:${{ github.sha }}

      - name: Deploy petstoreorderitemsreserver
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: petstore-orderitemsreserver
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/petstoreorderitemsreserver:${{ github.sha }}

