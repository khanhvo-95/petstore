petstore:
  service:
    pet:
      url: ${PETSTOREPETSERVICE_URL:http://localhost:8081}
    product:
      url: ${PETSTOREPRODUCTSERVICE_URL:http://localhost:8082}
    order:
      url: ${PETSTOREORDERSERVICE_URL:http://localhost:8083}
    orderitemsreserver:
      url: ${PETSTOREORDERITEMSRESERVER_URL:http://localhost:8085}
  security:
    # Enable in Module 10
    enabled: ${PETSTORE_SECURITY_ENABLED:false}
server:
  port: ${PETSTOREAPP_SERVER_PORT:8080}
  forward-headers-strategy: FRAMEWORK
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    ssl:
      enabled: false
    diskspace:
      enabled: false
    applicationinsights:
      enabled: false
    security:
      enabled: false
spring:
  application:
    name: petstoreapp
  thymeleaf:
    cache: false
  cache:
    cache-names: currentUsers
  cloud:
    discovery:
      enabled: false
    refresh:
      enabled: false
    openfeign:
      client:
        config:
          default:
            connect-timeout: 10000
            read-timeout: 30000
          pet-service:
            connect-timeout: 10000
            read-timeout: 30000
          product-service:
            connect-timeout: 10000
            read-timeout: 30000
          order-service:
            connect-timeout: 10000
            read-timeout: 30000
          orderitemsreserver-service:
            connect-timeout: 10000
            read-timeout: 30000
  security:
    # Used in Module 10
    oauth2:
      client:
        registration:
          azure:
            client-id: ${AZURE_CLIENT_ID}
            client-secret: ${AZURE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - offline_access
            redirect-uri: ${OAUTH_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            authorization-grant-type: authorization_code
        provider:
          azure:
            authorization-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID}/discovery/v2.0/keys
            user-name-attribute: sub
logging:
  level:
    root: INFO
    com.chtrembl.petstoreapp: INFO
    com.azure.monitor.opentelemetry.autoconfigure.implementation.quickpulse.QuickPulsePingSender: ERROR
    com.azure.core.http.netty.NettyAsyncHttpClient: ERROR